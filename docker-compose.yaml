services:
  postgres:
    image: postgres:16-alpine
    container_name: autor-recognition-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=autor_recognition
      - POSTGRES_USER=autor_user
      - POSTGRES_PASSWORD=autor_pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - app-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autor-recognition-php
    restart: unless-stopped
    volumes:
      - ./src:/var/www
      - ./composer.json:/var/www/composer.json:ro
      - ./composer.lock:/var/www/composer.lock:ro
    environment:
      - AI_API_URL=http://python-ai:8000/predict
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=autor_recognition
      - DB_USER=autor_user
      - DB_PASSWORD=autor_pass
    depends_on:
      - postgres
      - python-ai
    networks:
      - app-network

  python-ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: autor-recognition-ai
    restart: unless-stopped
    volumes:
      - ./ai/model:/app/model:ro
    environment:
      - MODEL_PATH=/app/model/handwriting_expert_epoch_5.pth
      - AI_THRESHOLD=0.3
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=autor_recognition
      - DB_USER=autor_user
      - DB_PASSWORD=autor_pass
    depends_on:
      - postgres
    networks:
      - app-network

  nginx:
    image: nginx:1.27-alpine
    container_name: autor-recognition-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      # Nginx serves only public HTML/assets and forwards PHP to FPM
      - ./src/public:/var/www/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data: