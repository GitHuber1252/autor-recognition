services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autor-recognition-php
    restart: unless-stopped
    volumes:
      - ./src:/var/www
      - ./composer.json:/var/www/composer.json:ro
      - ./composer.lock:/var/www/composer.lock:ro
    environment:
      - AI_API_URL=http://python-ai:8000/predict
    depends_on:
      - python-ai
    networks:
      - app-network

  python-ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: autor-recognition-ai
    restart: unless-stopped
    volumes:
      - ./ai/model:/app/model:ro
      - ./ai/etalons:/app/etalons
    environment:
      - MODEL_PATH=/app/model/handwriting_expert_epoch_5.pth
      - ETALON_DIR=/app/etalons
      - AI_THRESHOLD=0.3
    networks:
      - app-network

  nginx:
    image: nginx:1.27-alpine
    container_name: autor-recognition-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      # Nginx serves only public HTML/assets and forwards PHP to FPM
      - ./src/public:/var/www/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge