version: '3.8'

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autor-recognition
    volumes:
      - ./src:/var/www
    networks:
      - app-network

  nginx:
    image: nginx:latest
    container_name: nginx_server_new
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network
networks:
  app-network:
    driver: bridge